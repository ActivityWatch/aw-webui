name: Dependabot Auto-merge

on:
  workflow_run:
    types:
      - completed
    workflows:
      # List all required workflow names here.
      - Build

permissions:
  contents: write
  pull-requests: write

jobs:
  auto_merge:
    name: Enable auto-merge
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]' &&
      github.event.workflow_run.pull_requests[0].number

    steps:
      - name: Enable GitHub auto-merge for the triggering PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8.0.0
        with:
          script: |
            const triggeredPullRequests = context.payload.workflow_run.pull_requests;
            if (!triggeredPullRequests || triggeredPullRequests.length === 0) {
              core.info('No associated pull request on the triggering workflow run. Skipping.');
              return;
            }
            const prNumber = triggeredPullRequests[0].number;

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            if (pr.user.login !== 'dependabot[bot]' || pr.state !== 'open' || pr.draft) {
              core.info('PR is not an open Dependabot PR. Skipping.');
              return;
            }

            if (pr.auto_merge) {
              core.info('Auto-merge is already enabled.');
              return;
            }

            await github.graphql(
              `mutation($pullRequestId: ID!, $mergeMethod: PullRequestMergeMethod!) {
                enablePullRequestAutoMerge(input: {
                  pullRequestId: $pullRequestId,
                  mergeMethod: $mergeMethod
                }) {
                  clientMutationId
                }
              }`,
              {
                pullRequestId: pr.node_id,
                mergeMethod: 'SQUASH',
              }
            );

            core.info(`Enabled auto-merge for PR #${prNumber}.`);
